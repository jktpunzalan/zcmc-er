name: Build vendor

on:
  workflow_dispatch:
  push:
    paths:
      - composer.json
      - composer.lock
      - .github/workflows/build-vendor.yml

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, pdo_sqlite, sqlite3, zip, curl, dom, tokenizer, xml, fileinfo, openssl, bcmath
          coverage: none
          tools: composer:v2

      - name: Get Composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install PHP dependencies (with dev)
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Verify autoload
        run: php -r "exit(file_exists('vendor/autoload.php') ? 0 : 1);"

      - name: Archive vendor
        run: zip -r vendor.zip vendor

      - name: Upload vendor artifact
        uses: actions/upload-artifact@v4
        with:
          name: vendor-php82
          path: vendor.zip
          retention-days: 7
